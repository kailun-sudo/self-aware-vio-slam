# Self-Aware SLAM Configuration

# Paths
paths:
  slam_metrics_dir: "slam_metrics_dataset/"
  results_dir: "results/"
  model_save_dir: "results/models/"
  train_dataset_path: "results/train_dataset_v2.pkl"
  degradation_sweep_results: "../outputs/multisequence_degradation_grid/sweep_results.csv"

# EuRoC real-data paths (used by scripts/process_euroc_results.py)
euroc:
  dataset_dir: ""      # e.g. /data/euroc (extracted ASL format)
  vins_output_dir: ""   # e.g. /data/vins_output (VINS trajectory files)
  bag_dir: ""           # e.g. /data/euroc_bags (raw .bag files)

# Dataset
dataset:
  euroc_sequences:
    - "MH_01"
    - "MH_02"
    - "MH_03"
    - "MH_04"
    - "MH_05"
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  source_mode: "auto"   # auto, hybrid, sweep_runs, sequence_dirs
  include_baseline_runs: true
  baseline_runs_in_train: true
  run_split_seed: 42
  run_train_ratio: 0.50
  run_val_ratio: 0.25
  run_test_ratio: 0.25

# Features extracted from SLAM internals
features:
  names:
    - "feature_count"
    - "feature_tracking_ratio"
    - "reprojection_error_mean"
    - "reprojection_error_std"
    - "imu_residual_norm"
    - "camera_motion_magnitude"
    - "tracking_length"
  learning_names:
    - "feature_count"
    - "feature_tracking_ratio"
    - "reprojection_error_mean"
    - "reprojection_error_std"
    - "imu_residual_norm"
    - "camera_motion_magnitude"
    - "tracking_length"
    - "delta_feature_tracking_ratio"
    - "delta_reprojection_error_mean"
    - "delta_reprojection_error_std"
    - "delta_imu_residual_norm"
    - "delta_camera_motion_magnitude"
    - "delta_tracking_length"
    - "rolling_mean_feature_tracking_ratio"
    - "rolling_std_feature_tracking_ratio"
    - "rolling_mean_reprojection_error_mean"
    - "rolling_std_reprojection_error_mean"
    - "rolling_mean_camera_motion_magnitude"
    - "rolling_std_camera_motion_magnitude"
    - "slope_feature_tracking_ratio"
    - "slope_reprojection_error_mean"
    - "slope_camera_motion_magnitude"
  rolling_window: 5
  normalize: true  # z-score normalization

# Temporal window
temporal:
  window_size: 10  # frames

# Legacy failure definition retained for backward compatibility with older scripts
failure:
  pose_error_threshold: 0.3  # meters
  tracking_lost_is_failure: true

# V2 learning target definition
targets:
  mode: "future_window_max"
  prediction_horizon: 10
  regression_target: "future_max_pose_error"
  regression_aggregation: "max"
  classification_error_threshold: 0.18
  use_tracking_lost: true

# Degradation simulation
degradation:
  camera:
    motion_blur_kernel_sizes: [5, 9, 15]
    gaussian_noise_std: [10, 25, 50]
    brightness_change: [-50, -30, 30, 50]
    image_dropout_prob: [0.1, 0.3, 0.5]
  imu:
    bias_drift_std: [0.01, 0.05, 0.1]
    noise_amplification: [2.0, 5.0, 10.0]

# Model
model:
  type: "transformer"  # mlp, lstm, transformer
  mlp:
    hidden_dims: [128, 64, 32]
    dropout: 0.3
  lstm:
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.3

# Training
training:
  batch_size: 64
  learning_rate: 0.001
  epochs: 100
  early_stopping_patience: 10
  weight_decay: 0.0001
